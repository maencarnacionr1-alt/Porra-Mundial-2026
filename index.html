<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ranking</title>
  <style>
    .hidden { display: none; }
    table { border-collapse: collapse; }
    td, th { border: 1px solid #ccc; padding: 5px; }
    tr { cursor: pointer; }
  </style>
</head>
<body>

  <!-- Ranking -->
  <div id="rankingSection">
    <h1>Ranking</h1>
    <table>
      <thead>
        <tr>
          <th>Pos</th>
          <th>Nombre</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="rankingBody"></tbody>
    </table>
  </div>

  <!-- Player -->
  <div id="playerSection" class="hidden">
    <button onclick="showRanking()">← Volver</button>
    <h2 id="playerNameBig"></h2>
    <p>Total: <span id="statTotal"></span></p>
    <p>Preguntas: <span id="statPreguntas"></span></p>
    <p>Posición: <span id="statPos"></span></p>

    <table>
      <thead>
        <tr>
          <th>Pos</th>
          <th>Equipo</th>
          <th>Coef</th>
          <th>R1</th>
          <th>Octavos</th>
          <th>Cuartos</th>
          <th>Semis</th>
          <th>Terceros</th>
          <th>Final</th>
          <th>Puntos</th>
        </tr>
      </thead>
      <tbody id="teamsBody"></tbody>
    </table>
  </div>

  <script>
document.addEventListener("DOMContentLoaded", () => {

  const URL_RANKING = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvbv4wKVLcF-dhiuLmYtU3aR8diCVDA8EgQ-yxaZXXqotI_L2VSWcoFo0NwiPEXB0XJwOxu9prujQk/pub?gid=0&output=csv";
  const URL_TEAMS   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvbv4wKVLcF-dhiuLmYtU3aR8diCVDA8EgQ-yxaZXXqotI_L2VSWcoFo0NwiPEXB0XJwOxu9prujQk/pub?gid=176911669&output=csv";

  let data = [];

  Promise.all([
    fetch(URL_RANKING).then(r => r.text()),
    fetch(URL_TEAMS).then(r => r.text())
  ])
  .then(([rankingCSV, teamsCSV]) => {
    const rankingRows = parseCSV(rankingCSV);
    const teamRows = parseCSV(teamsCSV);

    data = rankingRows.map(player => ({
      name: player.name,
      preguntas: player.preguntas,
      total: player.total,
      teams: teamRows
        .filter(t => t.name === player.name)
        .map(t => ({
          pos: t.pos,
          team: t.team,
          coef: t.coef,
          r1: t.r1,
          octavos: t.octavos,
          cuartos: t.cuartos,
          semis: t.semis,
          terceros: t.terceros,
          final: t.final,
          puntos: t.puntos
        }))
    }));

    data.sort((a, b) =>
      parseFloat(b.total.replace(',', '.')) -
      parseFloat(a.total.replace(',', '.'))
    );

    init();
  })
  .catch(err => console.error(err));

  function parseCSV(csv) {
    const lines = csv.trim().split("\n");
    const delimiter = lines[0].includes(";") ? ";" : ",";
    const headers = lines.shift().split(delimiter);

    return lines.map(line => {
      const values = line.split(delimiter);
      const obj = {};
      headers.forEach((h, i) => obj[h.trim()] = values[i]?.trim());
      return obj;
    });
  }

  function init() {
    const tbody = document.getElementById("rankingBody");
    if (!tbody) {
      console.error("❌ Falta el tbody con id=rankingBody");
      return;
    }

    tbody.innerHTML = "";
    data.forEach((p, i) => {
      tbody.innerHTML += `<tr onclick="showPlayer(${i})">
        <td>#${i + 1}</td>
        <td>${p.name}</td>
        <td>${p.total}</td>
      </tr>`;
    });
  }

  window.showPlayer = function (idx) {
    const p = data[idx];

    document.getElementById("rankingSection").classList.add("hidden");
    document.getElementById("playerSection").classList.remove("hidden");

    document.getElementById("playerNameBig").textContent = p.name;
    document.getElementById("statTotal").textContent = p.total;
    document.getElementById("statPreguntas").textContent = p.preguntas;
    document.getElementById("statPos").textContent = "#" + (idx + 1);

    const tBody = document.getElementById("teamsBody");
    tBody.innerHTML = "";

    p.teams.forEach(t => {
      tBody.innerHTML += `<tr>
        <td>${t.pos}</td>
        <td>${t.team}</td>
        <td>${t.coef}</td>
        <td>${t.r1}</td>
        <td>${t.octavos || 0}</td>
        <td>${t.cuartos || 0}</td>
        <td>${t.semis || 0}</td>
        <td>${t.terceros || 0}</td>
        <td>${t.final || 0}</td>
        <td>${t.puntos}</td>
      </tr>`;
    });
  };

  window.showRanking = function () {
    document.getElementById("rankingSection").classList.remove("hidden");
    document.getElementById("playerSection").classList.add("hidden");
  };

});
</script>

</body>
</html>
