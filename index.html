<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial Adquira 2026</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --pitch-green: #1b5e20;
            --grass-light: #2e7d32;
            --grass-vibrant: #388e3c;
            --hover-row: #f1f8e9;
            --gold: #ffd700;
            --white: #ffffff;
            --soccer-dark: #121212;
            --text-main: #333333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2b10 0%, #1b5e20 50%, #2e7d32 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.6s ease-out;
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            background: linear-gradient(135deg, var(--soccer-dark) 0%, var(--pitch-green) 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 8px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
            border-radius: 30px 30px 0 0;
        }

        h1 { 
            font-family: 'Black Ops One', cursive;
            margin: 0; 
            font-size: 2.8rem; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            color: var(--white);
            text-shadow: 3px 3px 0px rgba(0,0,0,0.5);
        }

        .view-section { padding: 40px; }
        .hidden { display: none; }

        .btn-registro-container {
            position: absolute;
            bottom: -20px;
            left: 10px;
            z-index: 1001;
            transform: rotate(-5deg);
        }

        .btn-registro {
            background-color: var(--gold);
            color: var(--soccer-dark);
            padding: 8px 18px;
            border: 2px solid var(--white);
            border-radius: 10px 50px 50px 10px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        .btn-registro:hover {
            transform: scale(1.05) rotate(0deg);
            background-color: var(--white);
        }

        .dot-online {
            width: 8px;
            height: 8px;
            background-color: var(--pitch-green);
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .ranking-table { width: 100%; max-width: 500px; margin: 0 auto; border-collapse: collapse; }
        .ranking-table th { padding: 15px; text-align: left; color: #666; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; border-bottom: 2px solid #eee; }
        .ranking-table td { padding: 18px 15px; border-bottom: 1px solid #f0f0f0; font-size: 1.1rem; }
        .ranking-table tbody tr:hover { background-color: var(--hover-row); cursor: pointer; }
        
        .btn-return { background: #fff; border: 2px solid var(--pitch-green); padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 800; color: var(--pitch-green); text-transform: uppercase; font-size: 0.8rem; margin-bottom: 20px; }
        #playerNameBig { font-family: 'Black Ops One', cursive; font-size: 3.5rem; color: var(--pitch-green); text-align: center; text-transform: uppercase; }
        .equipo-select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 2px solid #eee; font-family: 'Inter', sans-serif; font-weight: 600; background: white; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <div class="btn-registro-container">
            <a href="javascript:void(0)" onclick="showRegister()" class="btn-registro">
                <div class="dot-online"></div>
                Registrar Equipo
            </a>
        </div>
        <h1>MUNDIAL ADQUIRA 2026</h1>
    </header>

    <!-- RANKING -->
    <div id="rankingSection" class="view-section">
        <table class="ranking-table">
            <thead>
                <tr><th>POSICIÓN</th><th>JUGADOR</th><th style="text-align: right;">PUNTOS</th></tr>
            </thead>
            <tbody id="rankingBody"></tbody>
        </table>
    </div>

    <!-- REGISTRO -->
    <div id="registerSection" class="view-section hidden">
        <button class="btn-return" onclick="showRanking()">← Volver al Ranking</button>
        <h2 id="playerNameBig" style="font-size: 2rem;">REGISTRO</h2>
        <form id="registrationForm" style="max-width: 500px; margin: 0 auto;">
            <div style="margin-bottom: 20px;">
                <label style="font-weight: 800; display: block; margin-bottom: 8px;">TU NOMBRE:</label>
                <input type="text" name="nombre" required style="width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd;">
            </div>
            <label style="font-weight: 800; display: block; margin-bottom: 10px;">TOP 8 EQUIPOS (Ordenados 1-8):</label>
            <div id="dropdownsContainer"></div>
            <button type="submit" class="btn-registro" style="width: 100%; justify-content: center; margin-top: 20px; font-size: 1rem; padding: 15px;">
                ENVIAR PRONÓSTICOS
            </button>
        </form>
        <div id="successMessage" class="hidden" style="text-align:center; color:var(--pitch-green); font-weight:800; padding: 20px;">
            ¡PRONÓSTICOS ENVIADOS CON ÉXITO!
        </div>
    </div>

    <!-- DETALLE JUGADOR -->
    <div id="playerSection" class="view-section hidden">
        <button class="btn-return" onclick="showRanking()">← Volver</button>
        <h2 id="playerNameBig">JUGADOR</h2>
    </div>
</div>

<script>
    // --- TUS URLS ORIGINALES ---
    const URL_RANKING = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvbv4wKVLcF-dhiuLmYtU3aR8diCVDA8EgQ-yxaZXXqotI_L2VSWcoFo0NwiPEXB0XJwOxu9prujQk/pub?gid=0&single=true&output=csv";
    const URL_TEAMS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvbv4wKVLcF-dhiuLmYtU3aR8diCVDA8EgQ-yxaZXXqotI_L2VSWcoFo0NwiPEXB0XJwOxu9prujQk/pub?gid=176911669&single=true&output=csv";
    
    // Lista de equipos para el registro (Puedes editarla)
    const equiposDisponibles = ["Argentina", "Brasil", "España", "Francia", "Alemania", "Portugal", "Inglaterra", "Uruguay", "Italia", "Holanda", "Bélgica", "Colombia"];

        async function cargarRanking() {
        try {
            const res = await fetch(URL_RANKING);
            const csv = await res.text();
            // Detecta si tu Excel usa coma o punto y coma
            const sep = csv.includes(";") ? ";" : ",";
            const filas = csv.split("\n").slice(1);
            
            document.getElementById('rankingBody').innerHTML = filas.map(f => {
                const c = f.split(sep);
                if(c.length < 2) return "";
                const nombre = c[1].trim();
                // AQUÍ RESTAURAMOS TU DISEÑO Y EL CLIC
                return `
                    <tr onclick="mostrarDetalle('${nombre}')">
                        <td width="33%">${c[0]}</td>
                        <td width="33%">${nombre}</td>
                        <td width="33%" style="text-align: right; font-weight: 800;">${c[2] || 0}</td>
                    </tr>`;
            }).join('');
        } catch (e) { console.error(e); }
    }


    function showRegister() {
        document.getElementById('rankingSection').classList.add('hidden');
        document.getElementById('playerSection').classList.add('hidden');
        document.getElementById('registerSection').classList.remove('hidden');
        renderDropdowns();
    }

    function showRanking() {
        document.getElementById('registerSection').classList.add('hidden');
        document.getElementById('playerSection').classList.add('hidden');
        document.getElementById('rankingSection').classList.remove('hidden');
    }

    function renderDropdowns() {
        const container = document.getElementById('dropdownsContainer');
        container.innerHTML = '';
        for (let i = 1; i <= 8; i++) {
            const sel = document.createElement('select');
            sel.name = `top${i}`;
            sel.className = 'equipo-select';
            sel.required = true;
            sel.addEventListener('change', updateOptions);
            container.appendChild(sel);
        }
        updateOptions();
    }

    function updateOptions() {
        const selects = document.querySelectorAll('.equipo-select');
        const selected = Array.from(selects).map(s => s.value).filter(v => v !== "");
        selects.forEach((s, i) => {
            const val = s.value;
            s.innerHTML = `<option value="">Posición ${i + 1}...</option>`;
            equiposDisponibles.forEach(e => {
                if (!selected.includes(e) || e === val) {
                    const opt = new Option(e, e);
                    if (e === val) opt.selected = true;
                    s.add(opt);
                }
            });
        });
    }

    document.addEventListener("DOMContentLoaded", cargarRanking);
</script>
</body>
</html>
