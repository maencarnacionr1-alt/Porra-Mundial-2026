<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial Adquira 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --green:#1b5e20;
  --light:#2e7d32;
  --gold:#ffd700;
}

body {
  font-family: Inter, sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0a2b10,#2e7d32);
}

.main {
  max-width:1000px;
  margin:20px auto;
  background:white;
  border-radius:20px;
  overflow:hidden;
}

header {
  background:linear-gradient(135deg,#111,var(--green));
  color:white;
  padding:30px;
  text-align:center;
  border-bottom:6px solid var(--gold);
}

h1 {font-family:"Black Ops One"; margin:0;}

.search {
  padding:20px;
  text-align:center;
}

.search input {
  padding:10px;
  width:80%;
  max-width:400px;
  border-radius:20px;
  border:1px solid #ccc;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:12px;
  text-align:left;
}

tr {
  cursor:pointer;
}

tr:hover {
  background:#f1f8e9;
}

.top1 {background:#fff8e1;}
.top2 {background:#f5f5f5;}
.top3 {background:#fce4ec;}

.hidden {display:none;}

.player {
  padding:20px;
}

.big {
  font-family:"Black Ops One";
  font-size:3rem;
  text-align:center;
  color:var(--green);
}

.stats {
  display:flex;
  justify-content:space-around;
  margin:20px 0;
}

.card {
  background:#111;
  color:white;
  padding:15px;
  border-radius:10px;
}

button {
  padding:10px 20px;
  border-radius:20px;
  border:2px solid var(--green);
  background:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="main">

<header>
<h1>MUNDIAL ADQUIRA 2026</h1>
</header>

<div id="ranking">

<div class="search">
<input type="text" id="search" placeholder="Buscar jugador...">
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Jugador</th>
<th>Puntos</th>
</tr>
</thead>
<tbody id="body">
<tr><td colspan="3">Cargando...</td></tr>
</tbody>
</table>

</div>

<div id="player" class="hidden player">
<button onclick="back()">← Volver</button>

<div class="big" id="name"></div>

<div class="stats">
<div class="card">Puntos: <span id="total"></span></div>
<div class="card">Preguntas: <span id="preg"></span></div>
<div class="card">Ranking: <span id="pos"></span></div>
</div>

<table>
<thead>
<tr>
<th>Equipo</th>
<th>Puntos</th>
</tr>
</thead>
<tbody id="teams"></tbody>
</table>

</div>

</div>

<script>

const URL1="https://docs.google.com/spreadsheets/d/e/2PACX-1vRvbv4wKVLcF-dhiuLmYtU3aR8diCVDA8EgQ-yxaZXXqotI_L2VSWcoFo0NwiPEXB0XJwOxu9prujQk/pub?gid=0&output=csv";
const URL2="https://docs.google.com/spreadsheets/d/e/2PACX-1vRvbv4wKVLcF-dhiuLmYtU3aR8diCVDA8EgQ-yxaZXXqotI_L2VSWcoFo0NwiPEXB0XJwOxu9prujQk/pub?gid=176911669&output=csv";

let data=[];

const norm=s=> (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();

const parse=csv=>{
  const l=csv.trim().split("\n");
  const d=l[0].includes(";")?";":",";
  const h=l.shift().toLowerCase().split(d);
  return l.map(r=>{
    const v=r.split(d);
    let o={};
    h.forEach((k,i)=>o[k]=v[i]?.replace(/"/g,"").trim());
    return o;
  });
};

async function load(){

  if(localStorage.data){
    data=JSON.parse(localStorage.data);
    render();
    return;
  }

  try{
    const [r1,r2]=await Promise.all([
      fetch(URL1).then(r=>r.text()),
      fetch(URL2).then(r=>r.text())
    ]);

    const a=parse(r1);
    const b=parse(r2);

    data=a.map(p=>({
      name:p.name||p.nombre,
      total:parseFloat((p.total||"0").replace(",",".")),
      preguntas:+p.preguntas||0,
      teams:b.filter(t=>norm(t.name||t.nombre)==norm(p.name||p.nombre))
        .map(t=>({
          team:t.team,
          puntos:parseFloat(t.puntos)||0
        }))
    }));

    data.sort((a,b)=>b.total-a.total);

    localStorage.data=JSON.stringify(data);

    render();

  }catch(e){
    document.getElementById("body").innerHTML="<tr><td colspan=3>Error cargando</td></tr>";
  }
}

function render(filter=""){
  const body=document.getElementById("body");
  body.innerHTML="";

  data
  .filter(p=>norm(p.name).includes(norm(filter)))
  .forEach((p,i)=>{
    const tr=document.createElement("tr");

    if(i==0) tr.className="top1";
    else if(i==1) tr.className="top2";
    else if(i==2) tr.className="top3";

    tr.innerHTML=`
      <td>#${i+1}</td>
      <td>${p.name}</td>
      <td>${p.total}</td>
    `;

    tr.onclick=()=>show(i);

    body.appendChild(tr);
  });
}

function show(i){
  const p=data[i];

  document.getElementById("ranking").classList.add("hidden");
  document.getElementById("player").classList.remove("hidden");

  name.textContent=p.name;
  total.textContent=p.total;
  preg.textContent=p.preguntas;
  pos.textContent="#"+(i+1);

  teams.innerHTML="";
  p.teams.forEach(t=>{
    teams.innerHTML+=`<tr><td>${t.team}</td><td>${t.puntos}</td></tr>`;
  });
}

function back(){
  document.getElementById("ranking").classList.remove("hidden");
  document.getElementById("player").classList.add("hidden");
}

search.oninput=e=>render(e.target.value);

load();

</script>

</body>
</html>
